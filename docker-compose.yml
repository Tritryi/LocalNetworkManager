version: "3"
services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      # DNS Ports
      - "53:53/tcp"
      - "53:53/udp"
      # Default HTTP Port
      - "8080:80/tcp"
      # Default HTTPs Port. FTL will generate a self-signed certificate
      - "8443:443/tcp"
    environment:
      # Set the appropriate timezone for your location from
      # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones, e.g:
      TZ: 'Europe/Bucharest'
      # Set a password to access the web interface. Not setting one will result in a random password being assigned
      FTLCONF_webserver_api_password: 'root'
      # If using Docker's default `bridge` network setting the dns listening mode should be set to 'ALL'
      FTLCONF_dns_listeningMode: 'ALL'
    # Volumes store your data between container upgrades
    volumes:
      # For persisting Pi-hole's databases and common configuration file
      - './etc-pihole:/etc/pihole'
    cap_add:
      # See https://docs.pi-hole.net/docker/configuration/#note-on-capabilities
      # Required if you are using Pi-hole as your DHCP server, else not needed
      - NET_ADMIN
    restart: unless-stopped
    networks:
      - networkpi

  webserv:
    container_name: mywebserv
    image: httpd:latest
    restart: unless-stopped
    volumes:
      - ./index.html:/usr/local/apache2/htdocs/index.html
    networks:
      - networkpi

  reverse-proxy:
    container_name: nginx-proxy
    image: nginx:latest
    ports:
      - 9080:80
      - 4433:443
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certificates/:/certificates/
    restart: unless-stopped
    networks:
      - networkpi

  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - networkpi


  db:
    container_name: postgresdb
    image: postgres:latest
    shm_size: 128mb
    environment:
      POSTGRES_USER: tristan
      POSTGRES_PASSWORD: root
      POSTGRES_DB: users
    volumes:
      - ./db_data/:/var/lib/postgresql/
    restart: unless-stopped
    networks:
      - networkpi

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:latest
    environment:
      # Required by pgAdmin
      PGADMIN_DEFAULT_EMAIL: tristan@gmail.com
      PGADMIN_DEFAULT_PASSWORD: root

      # Don't require the user to login
      PGADMIN_CONFIG_SERVER_MODE: 'False'

      # Don't require a "master" password after logging in
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    restart: unless-stopped
    networks:
      - networkpi




networks:
  networkpi:
    driver: bridge